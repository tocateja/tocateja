name: Actualizar productos Wallapop

on:
  schedule:
    - cron: "*/15 * * * *"   # cada 15 minutos
  workflow_dispatch:           # también permite ejecutarlo manualmente

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Obtener productos de Wallapop
        run: python scripts/fetch_products.py

      - name: Guardar cambios en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json
          git diff --cached --quiet || git commit -m "🔄 Actualizar productos Wallapop"
          git push
